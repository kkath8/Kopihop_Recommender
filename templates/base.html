<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}KopiHop{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a href="{{ url_for('main.home') }}" class="nav-logo">⋆☕︎ ˖ KopiHop</a>
    <div class="nav-links">
      <a href="{{ url_for('main.home') }}" class="nav-link {% if request.endpoint == 'main.home' %}active{% endif %}">Discover</a>
      <a href="{{ url_for('cafes.cafe_list') }}" class="nav-link {% if request.endpoint == 'cafes.cafe_list' %}active{% endif %}">All Cafes</a>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <p>⋆☕︎ ˖ KopiHop &nbsp;·&nbsp; Discovering the best coffee in Santa Rosa, Laguna</p>
  </footer>

  {% block scripts %}{% endblock %}
</body>
</html>
